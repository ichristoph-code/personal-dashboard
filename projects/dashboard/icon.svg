<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9f7aea"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b794f4"/>
      <stop offset="100%" stop-color="#7f9cf5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="56" y1="340" x2="456" y2="340" stroke="#667eea" stroke-width="1" opacity="0.15"/>
  <line x1="56" y1="260" x2="456" y2="260" stroke="#667eea" stroke-width="1" opacity="0.15"/>
  <line x1="56" y1="180" x2="456" y2="180" stroke="#667eea" stroke-width="1" opacity="0.15"/>

  <!-- Bars (bottom=420, chart height=340) -->
  <!-- Bar 1: 45% -->
  <rect x="57"  y="267" width="62" height="153" rx="10" fill="url(#barA)" opacity="0.75"/>
  <!-- Bar 2: 70% -->
  <rect x="141" y="182" width="62" height="238" rx="10" fill="url(#barA)" opacity="0.85"/>
  <!-- Bar 3: 95% — tallest, glows -->
  <rect x="225" y="97"  width="62" height="323" rx="10" fill="url(#barB)" filter="url(#glow)"/>
  <!-- Bar 4: 60% -->
  <rect x="309" y="216" width="62" height="204" rx="10" fill="url(#barA)" opacity="0.85"/>
  <!-- Bar 5: 80% -->
  <rect x="393" y="148" width="62" height="272" rx="10" fill="url(#barA)" opacity="0.75"/>

  <!-- Baseline -->
  <rect x="56" y="420" width="400" height="3" rx="1.5" fill="#667eea" opacity="0.5"/>
</svg>
